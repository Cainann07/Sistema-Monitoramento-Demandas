name: Pipeline de Integração Contínua (CI)

# Define que a pipeline vai rodar sempre que houver um push ou pull request na branch 'main'
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ☕ JOB 1: Testar o Back-End (Spring Boot)
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Rodar os Testes Automatizados do Java
        run: |
          cd back-end
          chmod +x ./mvnw
          ./mvnw test

  # 📐 JOB 2: Testar o Front-End (Angular + Vitest)
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar as Dependências do Front-end
        run: |
          cd frontend
          npm install # 👈 MUDADO DE 'npm ci' PARA 'npm install'

      - name: Rodar os Testes Automatizados do Vitest
        run: |
          cd frontend
          npx vitest run