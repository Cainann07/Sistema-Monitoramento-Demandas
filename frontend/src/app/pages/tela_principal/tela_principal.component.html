<div class="container">
    <header>
        <h1>Monitoramento de Demandas</h1>
        <p-button label="Adicionar Demanda +" (onClick)="abrirModalInsercao()" />
    </header>

    <p-dialog header="Nova Demanda" [(visible)]="exibirModal" [style]="{ width: '25rem'}">
        <div class="campo-grupo">
            <label for="nome">Nome da Demanda</label>
            <input pInputText id="nome" [(ngModel)]="novaDemanda.nome" />
        </div>
        <div class="flex justify-content-end gap-2">
            <p-button label="Cancelar" severity="secondary" (onClick)="exibirModal = false" />
            <p-button label="Salvar" (onClick)="salvarDemanda()" />
        </div>
    </p-dialog>

    <p-dialog header="Editar Demanda" [(visible)]="exibirModalEdicao" [modal]="true" [style]="{ width: '25rem' }">

        <div class="campo-grupo">
            <label for="nomeEditar">Nome da Demanda</label>
            <input pInputText id="nomeEditar" [(ngModel)]="demandaEditada.nome" autocomplete="off" />
        </div>

        <div class="campo-status">
            <label for="statusEditar">Status</label>
            <div class="card flex justify-center">
                <p-select [options]="opcoesStatus" [(ngModel)]="demandaEditada.status" placeholder="Selecione o Status"
                    class="w-full md:w-56" />
            </div>
        </div>

        <div class="acoes-modal">
            <p-button label="Cancelar" severity="secondary" (onClick)="exibirModalEdicao = false" />
            <p-button label="Salvar Alterações" (onClick)="editarDemanda()" />
        </div>
    </p-dialog>

    <section class="registros">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Status</th>
                    <th>Editar</th>
                    <th>Excluir</th>
                </tr>
            </thead>
            <tbody>
                @if (demandas$ | async; as lista) {

                @for (d of lista; track d.id) {
                <tr>
                    <td>{{ d.id }}</td>
                    <td>{{ d.nome }}</td>
                    <td><span class="status">{{ d.status }}</span></td>
                    <td><p-button icon="pi pi-pencil" severity="warn" (onClick)="prepararEdicao(d)" [text]="true" />
                    </td>
                    <td><p-button icon="pi pi-trash" (onClick)="excluirDemanda(d.id)" severity="danger" [text]="true" />
                    </td>
                </tr>
                } @empty {
                <tr>
                    <td colspan="4" style="text-align: center; padding: 20px;">
                        Nenhum registro encontrado no banco de dados.
                    </td>
                </tr>
                }

                } @else {
                <tr>
                    <td colspan="4" style="text-align: center; padding: 20px;">
                        Carregando demandas...
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </section>
</div>
